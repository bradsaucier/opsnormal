name: 'Pipeline: Mainline Integrity'

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: mainline-integrity-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  verify_matrix:
    name: Verify (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      attestations: write
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 22
          - 24

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        env:
          HUSKY: 0
        run: npm ci

      - name: Verify npm package signatures
        if: matrix.node-version == 22
        run: npm audit signatures

      - name: Security audit
        if: matrix.node-version == 22
        run: npm run audit:security

      - name: Check formatting
        if: matrix.node-version == 22
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit and integration tests
        run: npm run test

      - name: Production build
        env:
          VITE_BASE_PATH: /
        run: npm run build

      - name: Upload CI-verified production artifact
        id: upload_dist
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && matrix.node-version == 22 }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist-ci-verified
          path: ./dist
          retention-days: 7

      - name: Attest build provenance
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && matrix.node-version == 22 }}
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: dist-ci-verified.zip
          subject-digest: sha256:${{ steps.upload_dist.outputs.artifact-digest }}

      - name: Generate release SBOM (production deps only)
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && matrix.node-version == 22 }}
        run: |
          prod_sbom_dir="$(mktemp -d)"
          export PROD_SBOM_DIR="$prod_sbom_dir"
          trap 'rm -rf "$prod_sbom_dir"' EXIT

          cp package-lock.json "$prod_sbom_dir/package-lock.json"
          node --input-type=module <<'NODE'
          import { readFileSync, writeFileSync } from 'node:fs';

          const packageJson = JSON.parse(readFileSync('package.json', 'utf8'));
          delete packageJson.devDependencies;
          writeFileSync(
            `${process.env.PROD_SBOM_DIR}/package.json`,
            `${JSON.stringify(packageJson, null, 2)}\n`,
          );
          NODE

          npm ci --omit=dev --ignore-scripts --prefix "$prod_sbom_dir"
          npm sbom --sbom-format=spdx --prefix "$prod_sbom_dir" > dist-ci-verified.spdx.json

          node --input-type=module <<'NODE'
          import { readFileSync } from 'node:fs';

          const sbom = JSON.parse(readFileSync('dist-ci-verified.spdx.json', 'utf8'));
          const packageNames = new Set(sbom.packages.map(({ name }) => name));
          const requiredRuntimePackages = [
            'opsnormal',
            'dexie',
            'dexie-react-hooks',
            'react',
            'react-dom',
            'workbox-window',
            'zod',
          ];
          const forbiddenBuildPackages = [
            '@playwright/test',
            '@vitejs/plugin-react',
            'eslint',
            'prettier',
            'tailwindcss',
            'typescript',
            'vite',
            'vitest',
          ];
          const missingRuntimePackages = requiredRuntimePackages.filter(
            (packageName) => !packageNames.has(packageName),
          );
          const includedBuildPackages = forbiddenBuildPackages.filter((packageName) =>
            packageNames.has(packageName),
          );

          if (sbom.spdxVersion !== 'SPDX-2.3') {
            throw new Error(`Unexpected SPDX version: ${sbom.spdxVersion}`);
          }

          if (missingRuntimePackages.length > 0) {
            throw new Error(
              `Release SBOM omitted runtime packages: ${missingRuntimePackages.join(', ')}`,
            );
          }

          if (includedBuildPackages.length > 0) {
            throw new Error(
              `Release SBOM included build-only packages: ${includedBuildPackages.join(', ')}`,
            );
          }
          NODE

      - name: Upload release SBOM artifact
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && matrix.node-version == 22 }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist-ci-verified-sbom
          path: dist-ci-verified.spdx.json
          retention-days: 7
          if-no-files-found: error

      - name: Attest release SBOM
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && matrix.node-version == 22 }}
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-name: dist-ci-verified.zip
          subject-digest: sha256:${{ steps.upload_dist.outputs.artifact-digest }}
          sbom-path: dist-ci-verified.spdx.json

      - name: Install Playwright browsers
        if: matrix.node-version == 22
        run: npx playwright install --with-deps chromium

      - name: End-to-end tests
        if: matrix.node-version == 22
        run: npm run test:e2e

  webkit_smoke:
    name: WebKit smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    continue-on-error: false

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        env:
          HUSKY: 0
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-webkit-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-webkit-
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        run: npx playwright install --with-deps webkit

      - name: WebKit smoke and migration proof
        run: npm run test:e2e:webkit

      - name: Upload WebKit traces
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: webkit-smoke-traces
          path: test-results/
          retention-days: 7

  firefox_smoke:
    name: Firefox smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    continue-on-error: false

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        env:
          HUSKY: 0
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-firefox-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-firefox-
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        run: npx playwright install --with-deps firefox

      - name: Firefox smoke and migration proof
        run: npm run test:e2e:firefox

      - name: Upload Firefox traces
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: firefox-smoke-traces
          path: test-results/
          retention-days: 7

  codeql:
    name: codeql
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        env:
          HUSKY: 0
        run: npm ci

      - name: Initialize CodeQL
        uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          languages: javascript-typescript
          # Pinned for reproducible analysis; aliases remain selected below.
          packs: codeql/javascript-queries@2.3.7
          queries: security-extended,security-and-quality

      - name: Build for CodeQL analysis
        env:
          VITE_BASE_PATH: /
        run: npm run build

      - name: Analyze with CodeQL
        uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          category: '/language:javascript-typescript'

  verify:
    name: verify
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - verify_matrix
      - webkit_smoke
      - firefox_smoke
      - codeql
    if: ${{ !cancelled() }}
    permissions: {}

    steps:
      - name: Fail when verify-matrix does not succeed
        if: ${{ needs.verify_matrix.result != 'success' }}
        run: |
          echo "verify_matrix result: ${{ needs.verify_matrix.result }}"
          exit 1

      - name: Fail when WebKit smoke does not succeed
        if: ${{ needs.webkit_smoke.result != 'success' }}
        run: |
          echo "webkit_smoke result: ${{ needs.webkit_smoke.result }}"
          exit 1

      - name: Fail when Firefox smoke does not succeed
        if: ${{ needs.firefox_smoke.result != 'success' }}
        run: |
          echo "firefox_smoke result: ${{ needs.firefox_smoke.result }}"
          exit 1

      - name: Fail when codeql does not succeed
        if: ${{ needs.codeql.result != 'success' }}
        run: |
          echo "codeql result: ${{ needs.codeql.result }}"
          exit 1

      - name: Confirm required CI success
        if: ${{ needs.verify_matrix.result == 'success' && needs.webkit_smoke.result == 'success' && needs.firefox_smoke.result == 'success' && needs.codeql.result == 'success' }}
        run: echo "All required CI jobs passed"
