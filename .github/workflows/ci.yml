name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify_matrix:
    name: Verify (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 22
          - 24

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit and integration tests
        run: npm run test

      - name: Production build
        run: npm run build

      - name: Install Playwright browsers
        if: matrix.node-version == 22
        run: npx playwright install --with-deps chromium

      - name: End-to-end tests
        if: matrix.node-version == 22
        run: npm run test:e2e

  webkit_smoke:
    name: WebKit smoke
    runs-on: ubuntu-latest
    needs: verify_matrix
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-webkit-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps webkit

      - name: WebKit smoke tests
        run: npm run test:e2e:webkit

      - name: Upload WebKit traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: webkit-smoke-traces
          path: test-results/
          retention-days: 7

  verify:
    name: verify
    runs-on: ubuntu-latest
    needs: verify_matrix
    if: ${{ always() }}

    steps:
      - name: Enforce matrix success
        run: |
          if [ "${{ needs.verify_matrix.result }}" != "success" ]; then
            echo "One or more matrix lanes failed"
            exit 1
          fi
