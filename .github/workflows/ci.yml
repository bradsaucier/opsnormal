name: 'Pipeline: Mainline Integrity'

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify_matrix:
    name: Verify (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    permissions:
      attestations: write
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 22
          - 24

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        env:
          HUSKY: 0
        run: npm ci

      - name: Verify npm package signatures
        if: matrix.node-version == 22
        run: npm audit signatures

      - name: Security audit
        if: matrix.node-version == 22
        run: npm run audit:security

      - name: Check formatting
        if: matrix.node-version == 22
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit and integration tests
        run: npm run test

      - name: Production build
        env:
          VITE_BASE_PATH: /
        run: npm run build

      - name: Upload CI-verified production artifact
        id: upload_dist
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && matrix.node-version == 22 }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist-ci-verified
          path: ./dist
          retention-days: 7

      - name: Attest build provenance
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && matrix.node-version == 22 }}
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: dist-ci-verified.zip
          subject-digest: sha256:${{ steps.upload_dist.outputs.artifact-digest }}

      - name: Install Playwright browsers
        if: matrix.node-version == 22
        run: npx playwright install --with-deps chromium

      - name: End-to-end tests
        if: matrix.node-version == 22
        run: npm run test:e2e

  webkit_smoke:
    name: WebKit smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    continue-on-error: false

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        env:
          HUSKY: 0
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-webkit-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps webkit

      - name: WebKit smoke and migration proof
        run: npm run test:e2e:webkit

      - name: Upload WebKit traces
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: webkit-smoke-traces
          path: test-results/
          retention-days: 7

  firefox_smoke:
    name: Firefox smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    continue-on-error: false

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        env:
          HUSKY: 0
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-firefox-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps firefox

      - name: Firefox smoke and migration proof
        run: npm run test:e2e:firefox

      - name: Upload Firefox traces
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: firefox-smoke-traces
          path: test-results/
          retention-days: 7

  codeql:
    name: codeql
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        env:
          HUSKY: 0
        run: npm ci

      - name: Initialize CodeQL
        uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          languages: javascript-typescript
          # Pinned for reproducible analysis; aliases remain selected below.
          packs: codeql/javascript-queries@2.3.7
          queries: security-extended,security-and-quality

      - name: Build for CodeQL analysis
        env:
          VITE_BASE_PATH: /
        run: npm run build

      - name: Analyze with CodeQL
        uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          category: '/language:javascript-typescript'

  verify:
    name: verify
    runs-on: ubuntu-latest
    needs:
      - verify_matrix
      - webkit_smoke
      - firefox_smoke
      - codeql
    if: ${{ !cancelled() }}
    permissions: {}

    steps:
      - name: Fail when verify-matrix does not succeed
        if: ${{ needs.verify_matrix.result != 'success' }}
        run: |
          echo "verify_matrix result: ${{ needs.verify_matrix.result }}"
          exit 1

      - name: Fail when WebKit smoke does not succeed
        if: ${{ needs.webkit_smoke.result != 'success' }}
        run: |
          echo "webkit_smoke result: ${{ needs.webkit_smoke.result }}"
          exit 1

      - name: Fail when Firefox smoke does not succeed
        if: ${{ needs.firefox_smoke.result != 'success' }}
        run: |
          echo "firefox_smoke result: ${{ needs.firefox_smoke.result }}"
          exit 1

      - name: Fail when codeql does not succeed
        if: ${{ needs.codeql.result != 'success' }}
        run: |
          echo "codeql result: ${{ needs.codeql.result }}"
          exit 1

      - name: Confirm required CI success
        if: ${{ needs.verify_matrix.result == 'success' && needs.webkit_smoke.result == 'success' && needs.firefox_smoke.result == 'success' && needs.codeql.result == 'success' }}
        run: echo "All required CI jobs passed"
