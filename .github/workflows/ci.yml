name: 'Pipeline: Mainline Integrity'

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify_matrix:
    name: Verify (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 22
          - 24

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.0.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        env:
          HUSKY: 0
        run: npm ci

      - name: Security audit
        if: matrix.node-version == 22
        run: npm run audit:security

      - name: Check formatting
        if: matrix.node-version == 22
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit and integration tests
        run: npm run test

      - name: Production build
        env:
          VITE_BASE_PATH: /
        run: npm run build

      - name: Upload CI-verified production artifact
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && matrix.node-version == 22 }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist-ci-verified
          path: ./dist
          retention-days: 7

      - name: Install Playwright browsers
        if: matrix.node-version == 22
        run: npx playwright install --with-deps chromium

      - name: End-to-end tests
        if: matrix.node-version == 22
        run: npm run test:e2e

  webkit_smoke:
    name: WebKit smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    continue-on-error: false

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.0.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        env:
          HUSKY: 0
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-webkit-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps webkit

      - name: WebKit smoke tests
        run: npm run test:e2e:webkit

      - name: Upload WebKit traces
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: webkit-smoke-traces
          path: test-results/
          retention-days: 7

  verify:
    name: verify
    runs-on: ubuntu-latest
    needs:
      - verify_matrix
      - webkit_smoke
    if: ${{ !cancelled() }}

    steps:
      - name: Fail when verify-matrix does not succeed
        if: ${{ needs.verify_matrix.result != 'success' }}
        run: |
          echo "verify_matrix result: ${{ needs.verify_matrix.result }}"
          exit 1

      - name: Fail when WebKit smoke does not succeed
        if: ${{ needs.webkit_smoke.result != 'success' }}
        run: |
          echo "webkit_smoke result: ${{ needs.webkit_smoke.result }}"
          exit 1

      - name: Confirm required CI success
        if: ${{ needs.verify_matrix.result == 'success' && needs.webkit_smoke.result == 'success' }}
        run: echo "All required CI jobs passed"
