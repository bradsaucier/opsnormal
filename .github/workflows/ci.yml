name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  # Remove after GitHub's JavaScript actions default to Node 24 on 2026-06-02.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  HUSKY: 0

jobs:
  verify_matrix:
    name: Verify (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 22
          - 24

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        if: matrix.node-version == 22
        run: npm run audit:security

      - name: Check formatting
        if: matrix.node-version == 22
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit and integration tests
        run: npm run test

      - name: Production build
        run: npm run build

      - name: Install Playwright browsers
        if: matrix.node-version == 22
        run: npx playwright install --with-deps chromium

      - name: End-to-end tests
        if: matrix.node-version == 22
        run: npm run test:e2e

  webkit_smoke:
    name: WebKit smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    continue-on-error: false

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-webkit-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps webkit

      - name: WebKit smoke tests
        run: npm run test:e2e:webkit

      - name: Upload WebKit traces
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: webkit-smoke-traces
          path: test-results/
          retention-days: 7

  verify:
    name: verify
    runs-on: ubuntu-latest
    needs:
      - verify_matrix
      - webkit_smoke
    if: ${{ !cancelled() }}

    steps:
      - name: Fail when verify-matrix does not succeed
        if: ${{ needs.verify_matrix.result != 'success' }}
        run: |
          echo "verify_matrix result: ${{ needs.verify_matrix.result }}"
          exit 1

      - name: Fail when WebKit smoke does not succeed
        if: ${{ needs.webkit_smoke.result != 'success' }}
        run: |
          echo "webkit_smoke result: ${{ needs.webkit_smoke.result }}"
          exit 1

      - name: Confirm required CI success
        if: ${{ needs.verify_matrix.result == 'success' && needs.webkit_smoke.result == 'success' }}
        run: echo "All required CI jobs passed"
