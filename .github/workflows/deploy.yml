name: 'Pipeline: Pages Release'

on:
  workflow_run: # zizmor: ignore[dangerous-triggers] gated to successful main push and verified provenance before smoke or publish
    workflows:
      - 'Pipeline: Mainline Integrity'
    types:
      - completed
    branches:
      - main

permissions:
  actions: read
  contents: read

concurrency:
  group: pages-release-pipeline
  cancel-in-progress: true

jobs:
  release_smoke:
    name: Release smoke
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      attestations: read
      contents: read

    steps:
      - name: Await CodeQL verdict for release SHA
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          RELEASE_SHA: ${{ github.event.workflow_run.head_sha }}
          CODEQL_POLL_INTERVAL_SECONDS: '20'
          CODEQL_POLL_TIMEOUT_SECONDS: '720'
          CODEQL_WORKFLOW_FILE: codeql.yml
        run: |
          set -euo pipefail

          deadline=$(( $(date +%s) + CODEQL_POLL_TIMEOUT_SECONDS ))
          while :; do
            payload="$(
              gh api "/repos/${REPOSITORY}/actions/workflows/${CODEQL_WORKFLOW_FILE}/runs?event=push&head_sha=${RELEASE_SHA}&per_page=100" \
                | jq -c --arg sha "${RELEASE_SHA}" '
                    [.workflow_runs[] | select(.head_sha == $sha)]
                    | sort_by(.created_at)
                    | last
                  '
            )"

            if [ -n "$payload" ] && [ "$payload" != "null" ]; then
              status="$(echo "$payload" | jq -r '.status // ""')"
              conclusion="$(echo "$payload" | jq -r '.conclusion // ""')"
              html_url="$(echo "$payload" | jq -r '.html_url // ""')"

              if [ "$status" = "completed" ]; then
                if [ "$conclusion" = "success" ]; then
                  echo "CodeQL completed with success for ${RELEASE_SHA}."
                  exit 0
                fi

                echo "CodeQL completed with conclusion ${conclusion} for ${RELEASE_SHA}." >&2
                if [ -n "$html_url" ]; then
                  echo "CodeQL run: ${html_url}" >&2
                fi
                exit 1
              fi

              echo "CodeQL status for ${RELEASE_SHA}: ${status}. Waiting..."
              if [ -n "$html_url" ]; then
                echo "CodeQL run: ${html_url}"
              fi
            else
              echo "No CodeQL workflow run found yet for ${RELEASE_SHA}. Waiting..."
            fi

            if [ "$(date +%s)" -ge "$deadline" ]; then
              echo "Timed out awaiting CodeQL verdict for ${RELEASE_SHA}." >&2
              exit 1
            fi

            sleep "${CODEQL_POLL_INTERVAL_SECONDS}"
          done

      - name: Checkout release SHA
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        env:
          HUSKY: 0
        run: npm ci

      - name: Resolve CI-verified production artifact metadata
        id: ci_artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          UPSTREAM_RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          artifact_id="$(
            gh api "/repos/${REPOSITORY}/actions/runs/${UPSTREAM_RUN_ID}/artifacts" \
              --jq '.artifacts[] | select(.name == "dist-ci-verified") | .id' \
              | head -n 1
          )"
          if [ -z "$artifact_id" ]; then
            echo "Expected dist-ci-verified artifact in upstream run ${UPSTREAM_RUN_ID}" >&2
            exit 1
          fi
          echo "artifact_id=$artifact_id" >> "$GITHUB_OUTPUT"

      - name: Download CI-verified production artifact archive
        env:
          ARTIFACT_ID: ${{ steps.ci_artifact.outputs.artifact_id }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
        run: |
          curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPOSITORY}/actions/artifacts/${ARTIFACT_ID}/zip" \
            -o dist-ci-verified.zip

      - name: Verify build provenance
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          SOURCE_DIGEST: ${{ github.event.workflow_run.head_sha }}
        run: |
          gh attestation verify dist-ci-verified.zip \
            --repo "${REPOSITORY}" \
            --signer-workflow "${REPOSITORY}/.github/workflows/ci.yml" \
            --source-digest "${SOURCE_DIGEST}" \
            --source-ref refs/heads/main

      - name: Extract CI-verified production artifact
        run: |
          rm -rf ./dist
          mkdir -p ./dist
          unzip -q dist-ci-verified.zip -d ./dist

      - name: Cache Playwright browsers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-release-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-release-
            ${{ runner.os }}-playwright-webkit-
            ${{ runner.os }}-playwright-firefox-
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit firefox

      - name: Run Chromium smoke against CI artifact
        env:
          PLAYWRIGHT_WEB_SERVER_CMD: npm run preview:prod
        run: npm run test:e2e:smoke

      - name: Run WebKit release smoke against CI artifact
        env:
          PLAYWRIGHT_WEB_SERVER_CMD: npm run preview:prod
        run: npm run test:e2e:webkit:smoke

      - name: Run Firefox release smoke against CI artifact
        env:
          PLAYWRIGHT_WEB_SERVER_CMD: npm run preview:prod
        run: npm run test:e2e:firefox:smoke

  deploy:
    name: Deploy
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main' }}
    needs:
      - release_smoke
    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: false
    permissions:
      actions: read
      attestations: read
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Resolve CI-verified production artifact metadata
        id: ci_artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          UPSTREAM_RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          artifact_id="$(
            gh api "/repos/${REPOSITORY}/actions/runs/${UPSTREAM_RUN_ID}/artifacts" \
              --jq '.artifacts[] | select(.name == "dist-ci-verified") | .id' \
              | head -n 1
          )"
          if [ -z "$artifact_id" ]; then
            echo "Expected dist-ci-verified artifact in upstream run ${UPSTREAM_RUN_ID}" >&2
            exit 1
          fi
          echo "artifact_id=$artifact_id" >> "$GITHUB_OUTPUT"

      - name: Download CI-verified production artifact archive
        env:
          ARTIFACT_ID: ${{ steps.ci_artifact.outputs.artifact_id }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
        run: |
          curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPOSITORY}/actions/artifacts/${ARTIFACT_ID}/zip" \
            -o dist-ci-verified.zip

      - name: Verify build provenance
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          SOURCE_DIGEST: ${{ github.event.workflow_run.head_sha }}
        run: |
          gh attestation verify dist-ci-verified.zip \
            --repo "${REPOSITORY}" \
            --signer-workflow "${REPOSITORY}/.github/workflows/ci.yml" \
            --source-digest "${SOURCE_DIGEST}" \
            --source-ref refs/heads/main

      - name: Extract CI-verified production artifact
        run: |
          rm -rf ./dist
          mkdir -p ./dist
          unzip -q dist-ci-verified.zip -d ./dist

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
