name: 'Pipeline: Release Provenance'

on:
  workflow_run:
    workflows:
      - 'Pipeline: Mainline Integrity'
    types:
      - completed
    branches:
      - main

permissions:
  actions: read
  contents: read

env:
  # Remove after GitHub's JavaScript actions default to Node 24 on 2026-06-02.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  HUSKY: 0

concurrency:
  group: pages-release-pipeline
  cancel-in-progress: true

jobs:
  release_smoke:
    name: Release smoke
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: read
      contents: read

    steps:
      - name: Checkout release SHA
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Download CI-verified production artifact
        uses: actions/download-artifact@v8
        with:
          name: dist-ci-verified
          path: ./dist
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-release-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Run Chromium smoke against CI artifact
        env:
          PLAYWRIGHT_WEB_SERVER_CMD: npm run preview:prod
        run: npm run test:e2e:smoke

      - name: Run WebKit release smoke against CI artifact
        env:
          PLAYWRIGHT_WEB_SERVER_CMD: npm run preview:prod
        run: npm run test:e2e:webkit:smoke

  deploy:
    name: Deploy
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main' }}
    needs:
      - release_smoke
    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: false
    permissions:
      actions: read
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download CI-verified production artifact
        uses: actions/download-artifact@v8
        with:
          name: dist-ci-verified
          path: ./dist
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5.0.0
