name: 'Pipeline: Pages Release'

on:
  workflow_run:
    workflows:
      - 'Pipeline: Mainline Integrity'
    types:
      - completed
    branches:
      - main

permissions:
  actions: read
  contents: read

concurrency:
  group: pages-release-pipeline
  cancel-in-progress: true

jobs:
  release_smoke:
    name: Release smoke
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      attestations: read
      contents: read

    steps:
      - name: Checkout release SHA
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.0.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        env:
          HUSKY: 0
        run: npm ci

      - name: Resolve CI-verified production artifact metadata
        id: ci_artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          artifact_id="$(
            gh api "/repos/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}/artifacts" \
              --jq '.artifacts[] | select(.name == "dist-ci-verified") | .id' \
              | head -n 1
          )"
          if [ -z "$artifact_id" ]; then
            echo "Expected dist-ci-verified artifact in upstream run ${{ github.event.workflow_run.id }}" >&2
            exit 1
          fi
          echo "artifact_id=$artifact_id" >> "$GITHUB_OUTPUT"

      - name: Download CI-verified production artifact archive
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api "/repos/${{ github.repository }}/actions/artifacts/${{ steps.ci_artifact.outputs.artifact_id }}/zip" \
            --output dist-ci-verified.zip

      - name: Verify build provenance
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh attestation verify dist-ci-verified.zip \
            --repo ${{ github.repository }} \
            --signer-workflow ${{ github.repository }}/.github/workflows/ci.yml \
            --source-digest ${{ github.event.workflow_run.head_sha }} \
            --source-ref refs/heads/main

      - name: Extract CI-verified production artifact
        run: |
          rm -rf ./dist
          mkdir -p ./dist
          unzip -q dist-ci-verified.zip -d ./dist

      - name: Cache Playwright browsers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-release-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-release-
            ${{ runner.os }}-playwright-webkit-
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Run Chromium smoke against CI artifact
        env:
          PLAYWRIGHT_WEB_SERVER_CMD: npm run preview:prod
        run: npm run test:e2e:smoke

      - name: Run WebKit release smoke against CI artifact
        env:
          PLAYWRIGHT_WEB_SERVER_CMD: npm run preview:prod
        run: npm run test:e2e:webkit:smoke

  deploy:
    name: Deploy
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main' }}
    needs:
      - release_smoke
    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: false
    permissions:
      actions: read
      attestations: read
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Resolve CI-verified production artifact metadata
        id: ci_artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          artifact_id="$(
            gh api "/repos/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}/artifacts" \
              --jq '.artifacts[] | select(.name == "dist-ci-verified") | .id' \
              | head -n 1
          )"
          if [ -z "$artifact_id" ]; then
            echo "Expected dist-ci-verified artifact in upstream run ${{ github.event.workflow_run.id }}" >&2
            exit 1
          fi
          echo "artifact_id=$artifact_id" >> "$GITHUB_OUTPUT"

      - name: Download CI-verified production artifact archive
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api "/repos/${{ github.repository }}/actions/artifacts/${{ steps.ci_artifact.outputs.artifact_id }}/zip" \
            --output dist-ci-verified.zip

      - name: Verify build provenance
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh attestation verify dist-ci-verified.zip \
            --repo ${{ github.repository }} \
            --signer-workflow ${{ github.repository }}/.github/workflows/ci.yml \
            --source-digest ${{ github.event.workflow_run.head_sha }} \
            --source-ref refs/heads/main

      - name: Extract CI-verified production artifact
        run: |
          rm -rf ./dist
          mkdir -p ./dist
          unzip -q dist-ci-verified.zip -d ./dist

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
