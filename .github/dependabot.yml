version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
      prod-dependencies:
        dependency-type: production
        update-types:
          - minor
          - patch
    ignore:
      # See ADR-0023 for the temporary React hooks lint exception while stable
      # releases do not yet support the repo's ESLint 10 baseline.
      - dependency-name: 'eslint-plugin-react-hooks'
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns:
          - '*'
